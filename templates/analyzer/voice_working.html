<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant - Business Idea Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #fff;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .speech-label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #a8b2ff;
        }
        
        #speechTextBox {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #4a5568;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            resize: vertical;
        }
        
        .button-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .analyze-button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .analyze-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }
        
        .analyze-button:disabled {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            cursor: not-allowed;
            transform: none;
        }
        
        .results-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: none;
        }
        
        .results-section.show {
            display: block;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .result-label {
            font-weight: bold;
            color: #a8b2ff;
        }
        
        .result-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .high { color: #10b981; }
        .medium { color: #f59e0b; }
        .low { color: #ef4444; }
        
        .recommendation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
            border-left: 4px solid #10b981;
        }
        
        .voice-controls {
            text-align: center;
            margin-top: 20px;
        }
        
        .voice-button {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
        }
        
        .voice-button:hover {
            transform: translateY(-2px);
        }
        
        .voice-button.speaking {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>🎤 AI Voice Assistant</h1>
            <p>Speak your business idea and get instant AI analysis</p>
        </div>
        
        <div class="input-section">
            <div class="speech-label">🎤 Your Business Idea</div>
            <textarea id="speechTextBox" 
                      placeholder="Speak or type your business idea here..."
                      rows="4"
                      oninput="checkButtonState()"></textarea>
        </div>
        
        <div class="button-section">
            <button id="analyzeButton" 
                    class="analyze-button" 
                    onclick="analyzeIdea()" 
                    disabled>
                🧠 Analyze My Idea
            </button>
        </div>
        
        <div id="resultsSection" class="results-section">
            <h2>📊 AI Analysis Results</h2>
            
            <div class="result-item">
                <span class="result-label">📈 Market Demand:</span>
                <span id="marketDemand" class="result-value">-</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">⚔️ Competition:</span>
                <span id="competitionLevel" class="result-value">-</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">⚠️ Risk Level:</span>
                <span id="riskLevel" class="result-value">-</span>
            </div>
            
            <div class="result-item">
                <span class="result-label">✅ Success Probability:</span>
                <span id="successProbability" class="result-value">-</span>%
            </div>
            
            <div class="recommendation">
                <h3>💡 AI Recommendation</h3>
                <p id="recommendationText">Analysis will appear here...</p>
            </div>
            
            <div class="voice-controls">
                <button id="speakButton" class="voice-button" onclick="speakResults()">
                    🔊 Speak Results
                </button>
            </div>
        </div>
    </div>

    <script>
        // Check button state based on text input
        function checkButtonState() {
            const textBox = document.getElementById('speechTextBox');
            const analyzeButton = document.getElementById('analyzeButton');
            
            if (textBox && analyzeButton) {
                const text = textBox.value.trim();
                const hasContent = text.length >= 5;
                
                analyzeButton.disabled = !hasContent;
                
                if (hasContent) {
                    analyzeButton.style.background = 'linear-gradient(135deg, #3b82f6, #2563eb)';
                    analyzeButton.style.cursor = 'pointer';
                } else {
                    analyzeButton.style.background = 'linear-gradient(135deg, #6b7280, #4b5563)';
                    analyzeButton.style.cursor = 'not-allowed';
                }
            }
        }
        
        // Analyze business idea
        function analyzeIdea() {
            console.log('🎯 Analyze button clicked');
            
            const textBox = document.getElementById('speechTextBox');
            const ideaText = textBox.value.trim();
            
            if (!ideaText || ideaText.length < 5) {
                alert('Please enter at least 5 characters for your business idea.');
                return;
            }
            
            console.log('📝 Analyzing:', ideaText);
            
            // Show loading state
            const analyzeButton = document.getElementById('analyzeButton');
            analyzeButton.textContent = '⏳ Analyzing...';
            analyzeButton.disabled = true;
            
            // Simulate API call (replace with actual fetch)
            setTimeout(() => {
                // Mock analysis data
                const analysis = {
                    market_demand_score: Math.floor(Math.random() * 40) + 60,
                    competition_level: ['Low', 'Medium', 'High'][Math.floor(Math.random() * 3)],
                    risk_score: Math.floor(Math.random() * 40) + 30,
                    success_probability: Math.floor(Math.random() * 30) + 70
                };
                
                // Display results
                displayResults(analysis);
                
                // Reset button
                analyzeButton.textContent = '🧠 Analyze My Idea';
                analyzeButton.disabled = false;
                
                console.log('✅ Analysis complete:', analysis);
            }, 2000);
        }
        
        // Display analysis results
        function displayResults(analysis) {
            console.log('📊 Displaying results:', analysis);
            
            const resultsSection = document.getElementById('resultsSection');
            const marketDemand = document.getElementById('marketDemand');
            const competitionLevel = document.getElementById('competitionLevel');
            const riskLevel = document.getElementById('riskLevel');
            const successProbability = document.getElementById('successProbability');
            const recommendationText = document.getElementById('recommendationText');
            
            if (!resultsSection || !marketDemand || !competitionLevel || !riskLevel || !successProbability || !recommendationText) {
                console.error('❌ Missing result elements');
                return;
            }
            
            // Update values
            marketDemand.textContent = analysis.market_demand_score;
            marketDemand.className = 'result-value ' + getScoreClass(analysis.market_demand_score);
            
            competitionLevel.textContent = analysis.competition_level;
            competitionLevel.className = 'result-value ' + getCompetitionClass(analysis.competition_level);
            
            riskLevel.textContent = analysis.risk_score;
            riskLevel.className = 'result-value ' + getScoreClass(analysis.risk_score);
            
            successProbability.textContent = analysis.success_probability;
            successProbability.className = 'result-value ' + getScoreClass(analysis.success_probability);
            
            // Generate recommendation
            const recommendation = generateRecommendation(analysis);
            recommendationText.textContent = recommendation;
            
            // Show results
            resultsSection.classList.add('show');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Generate recommendation
        function generateRecommendation(analysis) {
            const demand = analysis.market_demand_score;
            const competition = analysis.competition_level;
            const risk = analysis.risk_score;
            const success = analysis.success_probability;
            
            let recommendation = 'Your business idea ';
            
            if (demand > 70) {
                recommendation += 'has strong market demand';
            } else if (demand > 50) {
                recommendation += 'has moderate market potential';
            } else {
                recommendation += 'needs market validation';
            }
            
            if (competition === 'Low') {
                recommendation += ' with low competition';
            } else if (competition === 'Medium') {
                recommendation += ' in a competitive market';
            } else {
                recommendation += ' in a highly competitive space';
            }
            
            recommendation += '. Overall success probability: ' + success + '%.';
            
            return recommendation;
        }
        
        // Get score class
        function getScoreClass(score) {
            if (score >= 70) return 'high';
            if (score >= 50) return 'medium';
            return 'low';
        }
        
        // Get competition class
        function getCompetitionClass(level) {
            if (level === 'Low') return 'high';
            if (level === 'Medium') return 'medium';
            return 'low';
        }
        
        // Speak results
        function speakResults() {
            const recommendationText = document.getElementById('recommendationText');
            const speakButton = document.getElementById('speakButton');
            
            if (!recommendationText || !('speechSynthesis' in window)) {
                console.log('❌ Cannot speak - no speech synthesis or text');
                return;
            }
            
            const text = recommendationText.textContent;
            const utterance = new SpeechSynthesisUtterance(text);
            
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 0.8;
            
            speakButton.classList.add('speaking');
            speakButton.textContent = '🔊 Speaking...';
            
            utterance.onend = () => {
                speakButton.classList.remove('speaking');
                speakButton.textContent = '🔊 Speak Results';
            };
            
            speechSynthesis.speak(utterance);
        }
        
        // Voice recognition (optional enhancement)
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                
                document.getElementById('speechTextBox').value = transcript;
                checkButtonState();
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
            };
            
            // Add voice control button
            const voiceButton = document.createElement('button');
            voiceButton.textContent = '🎤 Start Voice';
            voiceButton.style.cssText = 'margin: 10px; padding: 8px 16px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer;';
            voiceButton.onclick = () => {
                if (voiceButton.textContent.includes('Start')) {
                    recognition.start();
                    voiceButton.textContent = '🛑 Stop Voice';
                } else {
                    recognition.stop();
                    voiceButton.textContent = '🎤 Start Voice';
                }
            };
            
            document.querySelector('.input-section').appendChild(voiceButton);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Voice Assistant loaded');
            checkButtonState();
        });
    </script>
</body>
</html>
