<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GenAI Startup Validator{% endblock %}</title>
    
    <!-- Google Fonts: Outfit for pristine headers, Inter for supreme legibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* DEEP GLASSMORPHISM DESIGN TOKENS */
            
            /* Backgrounds */
            --bg-deep-space: #05070A;
            --bg-gradient: radial-gradient(circle at top right, #111827, #05070A 60%);
            
            /* Glassmorphism Panels */
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            /* Accents */
            --accent-cyan: #00F0FF;
            --accent-cyan-dim: rgba(0, 240, 255, 0.15);
            --accent-purple: #8A2BE2;
            --accent-gradient: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            
            /* Typographic Colors */
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-dim: #64748B;
            
            /* Semantic Colors for Results */
            --score-high: #10B981;  /* Emerald */
            --score-med: #FBBF24;   /* Amber */
            --score-low: #EF4444;   /* Rose */
            
            /* Layout & Spacing */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition-swift: 0.2s ease-out;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep-space);
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: var(--transition-swift);
        }
        
        a:hover {
            color: #FFFFFF;
            text-shadow: 0 0 8px var(--accent-cyan-dim);
        }

        /* Essential Layout */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Global Navbar */
        .navbar {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(5, 7, 10, 0.7);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
        }

        .nav-brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-brand svg {
            width: 28px;
            height: 28px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-links a:hover, 
        .nav-links a.active {
            color: var(--text-primary);
        }

        /* Core Glass Component */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--glass-shadow);
            transition: var(--transition-smooth);
        }

        .glass-panel:hover {
            border-color: var(--glass-highlight);
            transform: translateY(-2px);
        }

        /* Premium Buttons */
        .btn-premium {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--accent-cyan);
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-premium:hover {
            background: var(--accent-cyan-dim);
            box-shadow: 0 0 20px var(--accent-cyan-dim);
            color: #FFF;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #FFF;
            border: none;
            padding: 0.75rem 1.75rem;
            border-radius: 99px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4);
            color: #FFF;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-icon-only {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-swift);
        }
        
        .btn-icon-only:hover {
            background: var(--glass-highlight);
            color: var(--text-primary);
        }

        /* Form Inputs */
        .premium-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            transition: var(--transition-smooth);
            outline: none;
        }
        
        .premium-input::placeholder {
            color: var(--text-dim);
        }

        .premium-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 1px var(--accent-cyan), 0 0 20px var(--accent-cyan-dim);
        }

        /* Main Content Wrapper */
        .main-content {
            flex: 1;
            margin-top: 72px; /* Navbar height */
            padding: 3rem 0;
            position: relative;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep-space);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* Global UI Utilities */
        .badge {
            padding: 0.35rem 0.85rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .badge-ai { background: rgba(138, 43, 226, 0.15); color: #D8B4FE; border: 1px solid rgba(138, 43, 226, 0.3); }
        .badge-heuristic { background: rgba(245, 158, 11, 0.15); color: #FDE68A; border: 1px solid rgba(245, 158, 11, 0.3); }

        /* Loader Overlay */
        #global-loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 7, 10, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #global-loader.active {
            opacity: 1;
            pointer-events: all;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #loader-text {
            margin-top: 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* Mobile Menu Button */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .nav-brand { font-size: 1.1rem; }
            .nav-brand svg { width: 22px; height: 22px; }
            
            .menu-toggle { display: block; }
            
            .nav-links { 
                position: absolute;
                top: 72px;
                left: 0;
                width: 100%;
                background: rgba(5, 7, 10, 0.95);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
                padding: 2rem;
                border-bottom: 1px solid var(--glass-border);
                clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); /* Hidden state */
                transition: clip-path 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }
            
            .nav-links.active {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
            
            .nav-links a { font-size: 1.1rem; }
            
            .main-content { padding: 1.5rem 0; }
        }
        
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Unified Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="{% url 'analyzer:home' %}" class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="12" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#00F0FF"/>
                            <stop offset="1" stop-color="#8A2BE2"/>
                        </linearGradient>
                    </defs>
                </svg>
                AI Idea Business Validator
            </a>
            <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle navigation">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav-links" id="nav-menu">
                <a href="{% url 'analyzer:home' %}"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="{% url 'voice_assistant:voice_interface' %}"><i class="fa-solid fa-microphone"></i> Voice Agent</a>
                <!-- We link to chat passing idea if possible, or just open base chat -->
                <a href="{% url 'chatbot:chat_interface' %}"><i class="fa-solid fa-comment-dots"></i> AI Strategist</a>
                <a href="{% url 'auth:login' %}" class="btn-premium"><i class="fa-solid fa-user-astronaut"></i> Sign In</a>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Loading Overlay used by Fetch APIs -->
    <div id="global-loader">
        <div class="spinner"></div>
        <div id="loader-text">Analyzing Business Logic...</div>
    </div>

    <script>
        // Global utility functions for UI
        window.UI = {
            showLoading: function(text = "Processing...") {
                document.getElementById('loader-text').innerText = text;
                document.getElementById('global-loader').classList.add('active');
            },
            hideLoading: function() {
                document.getElementById('global-loader').classList.remove('active');
            },
            getCookie: function(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
        };

        // Mobile Menu Toggle logic
        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            const icon = document.querySelector('.menu-toggle i');
            menu.classList.toggle('active');
            
            if (menu.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
